<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nocode - Boas Vindas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      color: #a0aec0;
    }

    .highlight {
      color: #63b3ed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Boas Vindas</h1>
    <p>Seja bem-vindo(a) à <span class="highlight">Nocode</span>!</p>
  </div>
</body>
</html>
